<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AR Fashion</title>
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }

    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* Camera feed behind everything */
    #video {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      /* mirror set dynamically by JS based on facing mode */
    }

    /* Three.js canvas on top of video */
    #three-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    /* Loading screen */
    #loading {
      position: fixed;
      inset: 0;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      z-index: 999;
      gap: 14px;
    }
    #loading h2 { font-size: 20px; font-weight: 500; }
    #loading p  { font-size: 13px; opacity: 0.5; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #333;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #progress-bar {
      width: 220px; height: 4px;
      background: #222; border-radius: 2px; overflow: hidden;
    }
    #progress-fill {
      height: 100%; width: 0%;
      background: #fff;
      transition: width 0.4s ease;
    }

    /* Hint text */
    #hint {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-family: sans-serif;
      font-size: 13px;
      padding: 10px 20px;
      border-radius: 20px;
      z-index: 10;
      white-space: nowrap;
    }

    /* Camera flip button */
    #flip-btn {
      position: fixed;
      top: 18px; right: 18px;
      z-index: 20;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      font-size: 22px;
      width: 46px; height: 46px;
      border-radius: 50%;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
    }

    /* Pose status dot */
    #pose-dot {
      position: fixed;
      top: 22px; left: 18px;
      z-index: 20;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #555;
      display: none;
    }
    #pose-dot.detected { background: #4f4; }
    #pose-dot.searching { background: #fa0; }
  </style>
</head>
<body>

  <div id="loading">
    <div class="spinner"></div>
    <h2>Loading AR...</h2>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <p id="status-text">Starting up...</p>
  </div>

  <div id="container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="three-canvas"></canvas>
  </div>

  <button id="flip-btn" title="Flip camera">🔄</button>
  <div id="pose-dot"></div>

  <div id="hint" style="display:none">
    Step back so your full body is visible
  </div>

  <!-- TensorFlow -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.0/dist/pose-detection.min.js"></script>

  <!-- Three.js -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/loaders/GLTFLoader.js"></script>

  <script>
    const loading      = document.getElementById('loading');
    const statusText   = document.getElementById('status-text');
    const progressFill = document.getElementById('progress-fill');
    const hint         = document.getElementById('hint');
    const video        = document.getElementById('video');
    const canvas       = document.getElementById('three-canvas');
    const flipBtn      = document.getElementById('flip-btn');
    const poseDot      = document.getElementById('pose-dot');

    let facingMode = 'environment'; // start with back camera
    let currentStream = null;

    function setProgress(pct, text) {
      progressFill.style.width = pct + '%';
      statusText.textContent = text;
    }

    // ─── THREE.JS SETUP ───────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 0); // transparent background

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
    camera.position.set(0, 0, 5);

    // Lighting
    scene.add(new THREE.AmbientLight(0xffffff, 2));
    const dirLight = new THREE.DirectionalLight(0xffffff, 3);
    dirLight.position.set(0, 5, 5);
    scene.add(dirLight);

    // Handle resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ─── LOAD 3D MODEL ────────────────────────────────────────────
    let model3D = null;

    setProgress(20, 'Loading 3D model...');

    let loader;
    try { loader = new THREE.GLTFLoader(); } catch(e) {
      console.error('GLTFLoader unavailable:', e);
      setProgress(50, 'Starting AR...');
      startAR();
      loader = null;
    }

    // Fallback: if model takes too long or fails, start AR without it
    const modelTimeout = setTimeout(() => {
      console.warn('Model load timed out — starting AR without 3D model');
      setProgress(50, 'Skipping model, starting AR...');
      startAR();
    }, 45000);

    if (loader) loader.load(
      'assets/model.glb',
      (gltf) => {
        clearTimeout(modelTimeout);
        model3D = gltf.scene;
        model3D.scale.set(1.5, 1.5, 1.5);
        model3D.visible = false;
        scene.add(model3D);
        setProgress(50, 'Loading pose detection...');
        startAR();
      },
      (xhr) => {
        if (xhr.total > 0) {
          const pct = 20 + Math.round((xhr.loaded / xhr.total) * 25);
          setProgress(pct, 'Loading 3D model...');
        } else {
          setProgress(25, `Loading 3D model… (${Math.round(xhr.loaded / 1024)}kb)`);
        }
      },
      (err) => {
        clearTimeout(modelTimeout);
        console.error('Model load error:', err);
        setProgress(50, 'Model failed — starting AR anyway...');
        startAR(); // don't get stuck — continue without 3D model
      }
    );

    // ─── START AR ─────────────────────────────────────────────────
    let arStarted = false;
    async function startAR() {
      if (arStarted) return;
      arStarted = true;
      // 1. Start camera
      setProgress(55, 'Starting camera...');

      async function startCamera(facing) {
        if (currentStream) currentStream.getTracks().forEach(t => t.stop());
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: facing, width: { ideal: 640 }, height: { ideal: 480 } },
          audio: false
        });
        currentStream = stream;
        video.srcObject = stream;
        // mirror only for front camera
        video.style.transform = facing === 'user' ? 'scaleX(-1)' : 'none';
        await new Promise(r => video.onloadedmetadata = r);
      }

      try {
        await startCamera(facingMode);
      } catch (e) {
        // fallback to front if back not available
        try { facingMode = 'user'; await startCamera(facingMode); }
        catch (e2) {
          console.error('Camera error:', e2);
          statusText.textContent = 'Camera access denied — please allow camera';
          return;
        }
      }

      flipBtn.style.display = 'flex';
      flipBtn.onclick = async () => {
        facingMode = facingMode === 'user' ? 'environment' : 'user';
        try { await startCamera(facingMode); } catch(e) { console.warn('Flip failed', e); }
      };

      // 2. Load pose detector
      setProgress(70, 'Loading body tracking AI...');
      statusText.textContent = 'Initialising TensorFlow…';
      await tf.ready();

      statusText.textContent = 'Downloading AI model (9MB)… please wait';

      let detector;
      try {
        const detectorPromise = poseDetection.createDetector(
          poseDetection.SupportedModels.MoveNet,
          { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING }
        );
        const timeout = new Promise((_, reject) =>
          setTimeout(() => reject(new Error('timeout')), 60000)
        );
        detector = await Promise.race([detectorPromise, timeout]);
      } catch (e) {
        console.error('Pose detector failed:', e);
        statusText.textContent = e.message === 'timeout'
          ? 'AI model download timed out. Check internet connection and refresh.'
          : 'Failed to load AI: ' + e.message;
        progressFill.style.background = '#f55';
        return;
      }

      setProgress(100, 'Ready!');
      setTimeout(() => {
        loading.style.display = 'none';
        hint.style.display = 'block';
        setTimeout(() => hint.style.display = 'none', 4000);
      }, 500);

      poseDot.style.display = 'block';
      poseDot.className = 'searching';

      // 3. Detection + render loop
      async function loop() {
        if (video.readyState >= 2) {
          const poses = await detector.estimatePoses(video);

          if (poses.length > 0) {
            const keypoints = poses[0].keypoints;
            const leftShoulder  = keypoints[5];
            const rightShoulder = keypoints[6];

            if (leftShoulder.score > 0.15 && rightShoulder.score > 0.15) {
              poseDot.className = 'detected';

              if (model3D) {
                model3D.visible = true;

                const midX = (leftShoulder.x + rightShoulder.x) / 2;
                const midY = (leftShoulder.y + rightShoulder.y) / 2;

                const vw = video.videoWidth  || window.innerWidth;
                const vh = video.videoHeight || window.innerHeight;

                // flip X only for front (mirrored) camera
                const xNorm = (midX / vw) * 2 - 1;
                const x = (facingMode === 'user' ? -xNorm : xNorm) * 3;
                const y = -((midY / vh) * 2 - 1) * 2.5;

                model3D.position.x += (x - model3D.position.x) * 0.2;
                model3D.position.y += (y - 0.3 - model3D.position.y) * 0.2;
                model3D.position.z = 0;

                const shoulderWidth = Math.abs(leftShoulder.x - rightShoulder.x) / vw;
                const autoScale = Math.max(0.5, shoulderWidth * 8);
                model3D.scale.setScalar(autoScale);
              }
            } else {
              poseDot.className = 'searching';
              if (model3D) model3D.visible = false;
            }
          } else {
            poseDot.className = 'searching';
            if (model3D) model3D.visible = false;
          }
        }

        renderer.render(scene, camera);
        requestAnimationFrame(loop);
      }

      loop();
    }
  </script>

</body>
</html>

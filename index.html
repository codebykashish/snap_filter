<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR Fashion</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #000; }

      #loading {
        position: fixed;
        inset: 0;
        background: #000;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: sans-serif;
        z-index: 999;
        gap: 16px;
      }
      #loading p { font-size: 14px; opacity: 0.6; }
      .spinner {
        width: 40px; height: 40px;
        border: 3px solid #333;
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      #hint {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.5);
        color: #fff;
        font-family: sans-serif;
        font-size: 13px;
        padding: 10px 20px;
        border-radius: 20px;
        z-index: 10;
        pointer-events: none;
      }
    </style>
  </head>
  <body>

    <!-- Loading screen -->
    <div id="loading">
      <div class="spinner"></div>
      <p>Loading AR experience...</p>
    </div>

    <!-- Hint text shown after AR starts -->
    <div id="hint" style="display:none">
      Point camera at your body and step back a little
    </div>

    <!-- MindAR + Three.js -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-body-three.prod.js"></script>

    <script type="module">
      import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
      import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

      const loading = document.getElementById('loading');
      const hint = document.getElementById('hint');

      // --- 1. Set up MindAR ---
      const mindarThree = new window.MINDAR.BODY.MindARThree({
        container: document.body
      });

      const { renderer, scene, camera } = mindarThree;

      // --- 2. Lighting ---
      const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
      scene.add(ambientLight);

      const dirLight = new THREE.DirectionalLight(0xffffff, 2);
      dirLight.position.set(0, 5, 5);
      scene.add(dirLight);

      // --- 3. Load your 3D model ---
      // Replace 'model.glb' with your actual file name
      const loader = new GLTFLoader();

      loader.load(
        'assets/model.glb',

        (gltf) => {
          const model = gltf.scene;

          // Scale — adjust this number until the model looks right on your body
          // Start with 2, go up or down depending on your model
          model.scale.set(2, 2, 2);

          // Position offset from the anchor point
          // X = left/right, Y = up/down, Z = towards/away camera
          model.position.set(0, -0.3, 0);

          // Anchor 11 = left shoulder (center of torso area)
          // See all anchor points in the README
          const anchor = mindarThree.addAnchor(11);
          anchor.group.add(model);
        },

        (progress) => {
          // Loading progress
          const pct = Math.round((progress.loaded / progress.total) * 100);
          document.querySelector('#loading p').textContent = `Loading model... ${pct}%`;
        },

        (error) => {
          console.error('Model load error:', error);
          document.querySelector('#loading p').textContent =
            'Could not load model. Check assets/model.glb exists.';
        }
      );

      // --- 4. Start AR ---
      await mindarThree.start();

      // Hide loading screen
      loading.style.display = 'none';
      hint.style.display = 'block';

      // Hide hint after 4 seconds
      setTimeout(() => { hint.style.display = 'none'; }, 4000);

      // --- 5. Render loop ---
      renderer.setAnimationLoop(() => {
        renderer.render(scene, camera);
      });
    </script>

  </body>
</html>

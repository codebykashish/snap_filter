<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR Fashion</title>

    <!-- Eruda: mobile console for debugging — remove after fixing -->
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

    <style>
      * { margin: 0; padding: 0; }
      body { overflow: hidden; }

      #loading {
        position: fixed;
        inset: 0;
        background: #000;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: sans-serif;
        z-index: 999;
        gap: 12px;
      }
      #loading h2 { font-size: 18px; font-weight: 500; }
      #loading p  { font-size: 13px; opacity: 0.5; }

      .spinner {
        width: 36px; height: 36px;
        border: 3px solid #333;
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      #progress-bar {
        width: 200px; height: 4px;
        background: #222; border-radius: 2px; overflow: hidden;
      }
      #progress-fill {
        height: 100%; width: 0%;
        background: #fff;
        transition: width 0.3s ease;
      }
    </style>

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-body-aframe.prod.js"></script>
  </head>

  <body>

    <div id="loading">
      <div class="spinner"></div>
      <h2>Loading AR...</h2>
      <div id="progress-bar"><div id="progress-fill"></div></div>
      <p id="status-text">Starting up...</p>
    </div>

    <a-scene
      mindar-body="filterMinCF:0.001; filterBeta:1000"
      embedded
      renderer="logarithmicDepthBuffer: true; colorManagement: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <!-- Preload the model here — fixes the gltf loading issue -->
        <a-asset-item id="my-model" src="assets/model.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-body-target="anchorIndex: 11">
        <!-- Note: gltf-model="#my-model" not "src: assets/model.glb" -->
        <a-entity
          gltf-model="#my-model"
          scale="2 2 2"
          position="0 -0.3 0"
        ></a-entity>
      </a-entity>

    </a-scene>

    <script>
      const statusText = document.getElementById('status-text');
      const progressFill = document.getElementById('progress-fill');
      const loading = document.getElementById('loading');

      let progress = 0;
      const fakeProgress = setInterval(() => {
        if (progress < 95) {
          progress += Math.random() * 6;
          progressFill.style.width = Math.min(progress, 95) + '%';
          if (progress < 30) statusText.textContent = 'Loading libraries...';
          else if (progress < 60) statusText.textContent = 'Loading body tracking AI...';
          else if (progress < 85) statusText.textContent = 'Almost ready...';
          else statusText.textContent = 'Starting camera...';
        }
      }, 400);

      // Hide loading after 10 seconds
      setTimeout(() => {
        clearInterval(fakeProgress);
        progressFill.style.width = '100%';
        loading.style.display = 'none';
      }, 10000);
    </script>

  </body>
</html>

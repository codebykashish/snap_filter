<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Test</title>
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.0/dist/pose-detection.min.js"></script>
</head>
<body style="font-family:sans-serif; padding:20px; background:#111; color:white;">
  <h1>Step 4 — TensorFlow loading...</h1>
  <p id="status">Waiting...</p>
  <script>
    window.addEventListener('load', () => {
      if (typeof tf !== 'undefined' && typeof poseDetection !== 'undefined') {
        document.getElementById('status').textContent = 'TensorFlow + Pose Detection loaded OK!';
        document.body.style.background = 'green';
      } else {
        document.getElementById('status').textContent = 'TensorFlow FAILED';
        document.body.style.background = 'red';
      }
    });
  </script>
</body>
</html>
